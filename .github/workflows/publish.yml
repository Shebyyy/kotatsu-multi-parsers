name: Build & Publish

permissions:
    contents: write

on:
    workflow_dispatch:
        inputs:
            force_build:
                description: 'Force build all repos (skip commit check)'
                required: false
                type: boolean
                default: false
    schedule:
        - cron: '0 */6 * * *'
    push:
        branches:
            - main

jobs:
    # ─────────────────────────────────────────────
    # Step 1: check which repos have new commits
    # ─────────────────────────────────────────────
    check:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.changed.outputs.matrix }}
            has_changes: ${{ steps.changed.outputs.has_changes }}
        steps:
            -   name: Checkout repo 🌏
                uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            -   name: Check for new commits in each repo 🔍
                id: changed
                run: |
                    REPOS=(
                        "Kotatsu-Redo/kotatsu-parsers-redo"
                        "YakaTeam/kotatsu-parsers"
                        "TamerAli-0/kotatsu-parsers"
                        "glitch-228/kaisoku-parsers"
                        "hany18h/kotatsu-parsers"
                        "skepsun/kototoro-parsers"
                    )

                    CHANGED=()

                    LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
                    if [ -n "$LATEST_TAG" ]; then
                        gh release download "$LATEST_TAG" --pattern "*.sha" --dir /tmp/shas 2>/dev/null || true
                    fi

                    for REPO in "${REPOS[@]}"; do
                        OWNER=$(echo "$REPO" | cut -d'/' -f1)
                        REMOTE_SHA=$(git ls-remote "https://github.com/$REPO.git" HEAD | cut -f1)

                        SHA_FILE="/tmp/shas/${OWNER}.sha"
                        OLD_SHA=""
                        if [ -f "$SHA_FILE" ]; then
                            OLD_SHA=$(cat "$SHA_FILE")
                        fi

                        if [ -n "$OLD_SHA" ] && [ "$OLD_SHA" = "$REMOTE_SHA" ]; then
                            echo "⏭️  $REPO — no changes, skipping"
                        else
                            echo "✅  $REPO — new commit detected, will build"
                            CHANGED+=("{\"repo\":\"$REPO\",\"owner\":\"$OWNER\",\"sha\":\"$REMOTE_SHA\",\"old_sha\":\"$OLD_SHA\"}")
                        fi
                    done

                    if [ "${{ inputs.force_build }}" = "true" ]; then
                        for REPO in "${REPOS[@]}"; do
                            OWNER=$(echo "$REPO" | cut -d'/' -f1)
                            REMOTE_SHA=$(git ls-remote "https://github.com/$REPO.git" HEAD | cut -f1)
                            CHANGED+=("{\"repo\":\"$REPO\",\"owner\":\"$OWNER\",\"sha\":\"$REMOTE_SHA\",\"old_sha\":\"\"}")
                        done
                        MATRIX=$(printf '%s\n' "${CHANGED[@]}" | jq -sc '{include: .}')
                        echo "has_changes=true" >> $GITHUB_OUTPUT
                        echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
                        echo "🔥 Force build — all repos"
                    elif [ ${#CHANGED[@]} -eq 0 ]; then
                        echo "has_changes=false" >> $GITHUB_OUTPUT
                        echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
                    else
                        MATRIX=$(printf '%s\n' "${CHANGED[@]}" | jq -sc '{include: .}')
                        echo "has_changes=true" >> $GITHUB_OUTPUT
                        echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
                    fi
                env:
                    GH_TOKEN: ${{ github.token }}

    # ─────────────────────────────────────────────
    # Step 2: build only changed repos, in parallel
    # ─────────────────────────────────────────────
    build:
        needs: check
        if: needs.check.outputs.has_changes == 'true'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.check.outputs.matrix) }}

        steps:
            -   name: Set up Java environment 🔧
                uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Set up Gradle environment 📦
                uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6
                with:
                    gradle-version: '9.3.1'

            -   name: Setup Android SDK 🚀
                uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

            -   name: Clone repo 🔁
                run: git clone --depth=1 "https://github.com/${{ matrix.repo }}.git" target-repo

            -   name: Generate changelog markdown 📝
                working-directory: target-repo
                env:
                    GH_TOKEN: ${{ github.token }}
                run: |
                    OWNER="${{ matrix.owner }}"
                    REPO="${{ matrix.repo }}"
                    NEW_SHA="${{ matrix.sha }}"
                    OLD_SHA="${{ matrix.old_sha }}"
                    mkdir -p build/libs
                    OUT_FILE="build/libs/${OWNER}.md"

                    COMMITS=""

                    # Try the compare API first (old_sha..new_sha)
                    if [ -n "$OLD_SHA" ]; then
                        COMMITS=$(gh api "repos/${REPO}/compare/${OLD_SHA}...${NEW_SHA}" \
                            --jq '.commits[:30][] | "- [" + (.sha[0:7]) + "](" + .html_url + ")  " + (.commit.message | split("\n")[0] | sub("\r$"; ""))' \
                            2>/dev/null || echo "")
                    fi

                    # Fallback: last 10 commits (first run, force-push, or compare failed)
                    if [ -z "$COMMITS" ]; then
                        COMMITS=$(gh api "repos/${REPO}/commits?sha=${NEW_SHA}&per_page=10" \
                            --jq '.[:10][] | "- [" + (.sha[0:7]) + "](" + .html_url + ")  " + (.commit.message | split("\n")[0] | sub("\r$"; ""))' \
                            2>/dev/null || echo "")
                    fi

                    {
                        echo "## ${REPO}"
                        echo ""
                        if [ -n "$COMMITS" ]; then
                            echo "$COMMITS"
                        else
                            echo "- _(could not fetch commit history)_"
                        fi
                        echo ""
                    } > "$OUT_FILE"

                    echo "📄 Changelog preview for ${OWNER}:"
                    cat "$OUT_FILE"
                continue-on-error: true

            -   name: Run assemble tasks 🏗️
                working-directory: target-repo
                run: ./gradlew assemble --rerun-tasks

            -   name: Process with d8 🚀
                working-directory: target-repo
                run: |
                    OWNER="${{ matrix.owner }}"
                    LIB_PATH="build/libs/kotatsu-parsers.jar"
                    OUT_PATH="build/libs/${OWNER}.jar"

                    if [ -f "$LIB_PATH" ]; then
                        d8 --release "$LIB_PATH" --output "$OUT_PATH"
                    else
                        FALLBACK=$(find build/libs -name "*.jar" | head -1)
                        [ -n "$FALLBACK" ] && d8 --release "$FALLBACK" --output "$OUT_PATH"
                    fi

                    # Save new SHA
                    echo "${{ matrix.sha }}" > "build/libs/${OWNER}.sha"
                continue-on-error: true

            -   name: Extract parser metadata 📋
                working-directory: target-repo
                run: |
                    python3 - "$PWD" "${{ matrix.owner }}" "${{ matrix.repo }}" << 'PYEOF'
                    import re, json, sys, glob

                    src_dir = sys.argv[1]
                    owner = sys.argv[2]
                    repo = sys.argv[3]
                    results = []

                    for filepath in glob.glob(f"{src_dir}/src/**/*.kt", recursive=True):
                        with open(filepath) as f:
                            content = f.read()

                        match = re.search(
                            r'@MangaSourceParser\(\s*"([^"]+)"\s*,\s*"([^"]+)"\s*,\s*"([^"]*)"(?:\s*,\s*ContentType\.(\w+))?\s*\)',
                            content
                        )
                        if not match:
                            continue

                        name, title, lang, content_type = match.groups()
                        content_type = content_type or "MANGA"
                        nsfw = 1 if content_type == "HENTAI" else 0
                        is_broken = bool(re.search(r'@Broken', content))

                        domain = ""

                        dm = re.search(r'ConfigKey\.Domain\(\s*"([^"]+)"\s*\)', content)
                        if dm:
                            domain = dm.group(1)

                        if not domain:
                            dm = re.search(
                                r'(?:Parser|Cms|HeanCms|OneMangaParser|NatsuParser|MadaraParser|MadThemeParser|GuyaParser|Manga18Parser|FoolSlideParser|GattsuParser|LilianaParser|KeyoAppParser|HotComicsParser|IkenParser|InitMangaParser|LikemangaParser|FuzzyDoodleParser|ComicasoParser|CupfoxParser|GalleryParser|GalleryAdultsParser|FmreaderParser|MangaBoxParser|AllMangaParser|BatCaveParser|BeeToonParser)\(.*?MangaParserSource\.\w+,\s*"([^"]+)"',
                                content,
                                re.DOTALL
                            )
                            if dm:
                                domain = dm.group(1)

                        base_url = f"https://{domain}" if domain else ""
                        icon_url = f"https://www.google.com/s2/favicons?domain={domain}&sz=64" if domain else ""

                        results.append({
                            "name": name,
                            "title": title,
                            "lang": lang,
                            "contentType": content_type,
                            "nsfw": nsfw,
                            "isBroken": is_broken,
                            "baseUrl": base_url,
                            "iconUrl": icon_url
                        })

                    results.sort(key=lambda x: x["name"])
                    out_path = f"build/libs/{owner}.json"
                    with open(out_path, "w") as f:
                        json.dump(results, f, ensure_ascii=False, indent=2)
                    print(f"✅ Extracted {len(results)} parsers → {out_path}")
                    PYEOF
                continue-on-error: true

            -   name: Upload as workflow artifact 📦
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.owner }}
                    path: |
                        target-repo/build/libs/${{ matrix.owner }}.jar
                        target-repo/build/libs/${{ matrix.owner }}.sha
                        target-repo/build/libs/${{ matrix.owner }}.md
                        target-repo/build/libs/${{ matrix.owner }}.json
                    if-no-files-found: warn

    # ─────────────────────────────────────────────
    # Step 3: merge new JARs with old ones → one release
    # ─────────────────────────────────────────────
    release:
        needs: [check, build]
        if: needs.check.outputs.has_changes == 'true'
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repo 🌏
                uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            -   name: Download newly built JARs 📥
                uses: actions/download-artifact@v4
                with:
                    path: output
                    merge-multiple: true

            -   name: Download latest existing release (for unchanged JARs) 📥
                run: |
                    LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
                    if [ -n "$LATEST_TAG" ]; then
                        gh release download "$LATEST_TAG" --pattern "*.jar" --dir output 2>/dev/null || true
                        gh release download "$LATEST_TAG" --pattern "*.sha" --dir output 2>/dev/null || true
                    fi
                env:
                    GH_TOKEN: ${{ github.token }}

            -   name: Publish new release 🌐
                run: |
                    BUILD_DATE=$(date -u +"%Y.%m.%d-%H%M")
                    TAG="build-$BUILD_DATE"

                    # Assemble changelog from all .md files (sorted alphabetically by owner)
                    {
                        echo "Updated parser JARs."
                        echo ""
                        for MD_FILE in output/*.md; do
                            [ -f "$MD_FILE" ] || continue
                            cat "$MD_FILE"
                        done
                    } > /tmp/release_notes.md

                    echo "📝 Final release notes:"
                    cat /tmp/release_notes.md

                    gh release create "$TAG" output/*.jar output/*.sha \
                        --title "Build $BUILD_DATE" \
                        --notes-file /tmp/release_notes.md \
                        --latest
                env:
                    GH_TOKEN: ${{ github.token }}

    # ─────────────────────────────────────────────
    # Step 4: commit index JSON files to repo
    # ─────────────────────────────────────────────
    commit-index:
        needs: [check, build]
        if: needs.check.outputs.has_changes == 'true'
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repo 🌏
                uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}

            -   name: Download index files 📥
                uses: actions/download-artifact@v4
                with:
                    path: output
                    merge-multiple: true

            -   name: Commit index files 📋
                run: |
                    mkdir -p index
                    UPDATED=0
                    for JSON_FILE in output/*.json; do
                        [ -f "$JSON_FILE" ] || continue
                        BASENAME=$(basename "$JSON_FILE")
                        cp "$JSON_FILE" "index/${BASENAME}"
                        UPDATED=$((UPDATED + 1))
                    done

                    if [ "$UPDATED" -eq 0 ]; then
                        echo "⚠️ No index files found, skipping commit"
                        exit 0
                    fi

                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git add index/
                    git diff --cached --quiet || git commit -m "update index — ${UPDATED} file(s) $(date -u +%Y.%m.%d-%H%M)"
                    git push
