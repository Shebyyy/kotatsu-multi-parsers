name: Build & Publish

on:
    workflow_dispatch:
    schedule:
        - cron: '0 */6 * * *'
    push:
        branches:
            - main

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout workflow repo 🌏
                uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

            -   name: Set up Java environment 🔧
                uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5 # v5.2.0
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Set up Gradle environment 📦
                uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
                with:
                    gradle-version: '9.3.1'

            -   name: Setup Android SDK 🚀
                uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

            -   name: Download existing JARs from latest release 📥
                run: |
                    mkdir -p output
                    # Pull all existing JARs from the current latest release (ignore error if no release yet)
                    gh release download latest --pattern "*.jar" --dir output || echo "No existing release found, starting fresh"
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Build changed repos & update JARs 🏗️
                run: |
                    REPOS=(
                        "Kotatsu-Redo/kotatsu-parsers-redo"
                        "YakaTeam/kotatsu-parsers"
                        "TamerAli-0/kotatsu-parsers"
                        "glitch-228/kaisoku-parsers"
                        "hany18h/kotatsu-parsers"
                    )

                    for REPO in "${REPOS[@]}"; do
                        OWNER=$(echo "$REPO" | cut -d'/' -f1)
                        JAR_NAME="${OWNER}.jar"

                        echo "──────────────────────────────────"
                        echo "Processing $REPO → $JAR_NAME"

                        # Clone repo
                        git clone --depth=1 "https://github.com/$REPO.git" target-repo

                        REMOTE_SHA=$(git -C target-repo rev-parse HEAD)

                        # Check SHA stored from last run
                        SHA_FILE="output/${OWNER}.sha"
                        if [ -f "$SHA_FILE" ] && [ "$(cat $SHA_FILE)" = "$REMOTE_SHA" ] && [ -f "output/$JAR_NAME" ]; then
                            echo "✅ $REPO unchanged, reusing existing JAR"
                        else
                            echo "🔨 $REPO changed or new, building..."
                            cd target-repo
                            ./gradlew assemble --rerun-tasks

                            LIB_PATH="build/libs/kotatsu-parsers.jar"
                            OUT_PATH="../output/$JAR_NAME"

                            if [ -f "$LIB_PATH" ]; then
                                d8 --release "$LIB_PATH" --output "$OUT_PATH"
                            else
                                FALLBACK=$(find build/libs -name "*.jar" | head -1)
                                if [ -n "$FALLBACK" ]; then
                                    d8 --release "$FALLBACK" --output "$OUT_PATH"
                                else
                                    echo "⚠️ No JAR found for $REPO, skipping"
                                fi
                            fi

                            cd ..
                            # Save SHA for next run
                            echo "$REMOTE_SHA" > "$SHA_FILE"
                        fi

                        rm -rf target-repo
                    done
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Upload all JARs to single latest release 🌐
                run: |
                    # Delete and recreate the 'latest' release with all JARs
                    gh release delete latest --yes || true
                    gh release create latest output/*.jar \
                        --title "Latest Build" \
                        --notes "Auto-updated. Contains latest JAR for each parser repo." \
                        --latest
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
