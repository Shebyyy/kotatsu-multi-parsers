name: Build & Publish

on:
    workflow_dispatch:
    schedule:
        - cron: '0 */6 * * *'
    push:
        branches:
            - main

jobs:
    check:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.changed.outputs.matrix }}
            has_changes: ${{ steps.changed.outputs.has_changes }}
        steps:
            -   name: Checkout repo 🌏
                uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

            -   name: Check for new commits in each repo 🔍
                id: changed
                run: |
                    REPOS=(
                        "Kotatsu-Redo/kotatsu-parsers-redo"
                        "YakaTeam/kotatsu-parsers"
                        "TamerAli-0/kotatsu-parsers"
                        "glitch-228/kaisoku-parsers"
                        "hany18h/kotatsu-parsers"
                    )

                    CHANGED=()

                    for REPO in "${REPOS[@]}"; do
                        OWNER=$(echo "$REPO" | cut -d'/' -f1)
                        REMOTE_SHA=$(git ls-remote "https://github.com/$REPO.git" HEAD | cut -f1)

                        # Download last known SHA for this repo
                        gh release download latest \
                            --pattern "${OWNER}.sha" \
                            --dir /tmp/shas 2>/dev/null || true

                        SHA_FILE="/tmp/shas/${OWNER}.sha"
                        if [ -f "$SHA_FILE" ] && [ "$(cat $SHA_FILE)" = "$REMOTE_SHA" ]; then
                            echo "⏭️  $REPO — no changes, skipping"
                        else
                            echo "✅  $REPO — new commit detected, will build"
                            CHANGED+=("{\"repo\":\"$REPO\",\"owner\":\"$OWNER\",\"sha\":\"$REMOTE_SHA\"}")
                        fi
                    done

                    if [ ${#CHANGED[@]} -eq 0 ]; then
                        echo "has_changes=false" >> $GITHUB_OUTPUT
                        echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
                    else
                        MATRIX=$(printf '%s\n' "${CHANGED[@]}" | jq -sc '{include: .}')
                        echo "has_changes=true" >> $GITHUB_OUTPUT
                        echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
                    fi
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        needs: check
        if: needs.check.outputs.has_changes == 'true'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.check.outputs.matrix) }}

        steps:
            -   name: Set up Java environment 🔧
                uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5 # v5.2.0
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Set up Gradle environment 📦
                uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
                with:
                    gradle-version: '9.3.1'

            -   name: Setup Android SDK 🚀
                uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

            -   name: Clone repo 🔁
                run: git clone --depth=1 "https://github.com/${{ matrix.repo }}.git" target-repo

            -   name: Run assemble tasks 🏗️
                working-directory: target-repo
                run: ./gradlew assemble --rerun-tasks

            -   name: Process with d8 🚀
                working-directory: target-repo
                run: |
                    OWNER="${{ matrix.owner }}"
                    LIB_PATH="build/libs/kotatsu-parsers.jar"
                    OUT_PATH="build/libs/${OWNER}.jar"

                    if [ -f "$LIB_PATH" ]; then
                        d8 --release "$LIB_PATH" --output "$OUT_PATH"
                    else
                        FALLBACK=$(find build/libs -name "*.jar" | head -1)
                        [ -n "$FALLBACK" ] && d8 --release "$FALLBACK" --output "$OUT_PATH"
                    fi

                    # Save new SHA
                    echo "${{ matrix.sha }}" > "build/libs/${OWNER}.sha"
                continue-on-error: true

            -   name: Upload as workflow artifact 📦
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.owner }}
                    path: |
                        target-repo/build/libs/${{ matrix.owner }}.jar
                        target-repo/build/libs/${{ matrix.owner }}.sha
                    if-no-files-found: warn

    release:
        needs: [check, build]
        if: needs.check.outputs.has_changes == 'true'
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repo 🌏
                uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v6.0.2

            -   name: Download newly built JARs 📥
                uses: actions/download-artifact@v4
                with:
                    path: output
                    merge-multiple: true

            -   name: Download unchanged JARs from previous release 📥
                run: |
                    gh release download latest \
                        --pattern "*.jar" \
                        --dir output 2>/dev/null || true
                    gh release download latest \
                        --pattern "*.sha" \
                        --dir output 2>/dev/null || true
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Publish single latest release 🌐
                run: |
                    gh release delete latest --yes || true
                    gh release create latest output/*.jar output/*.sha \
                        --title "Latest Build" \
                        --notes "Auto-updated. Contains latest JAR for each parser repo." \
                        --latest
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
